<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CEN Studio</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">CEN Developer Tool</p>
        <h1>CEN Studio</h1>
        <p class="subtitle">BibleMaps QA Checker v0.1.3</p>
      </div>
      <div class="status-pill" id="installStatus">PWA Ready</div>
    </header>

    <main>
      <section class="card principle">
        <h2>원칙</h2>
        <p>사람은 판단하고, 프로그램은 반복한다.</p>
      </section>

      <section class="card uploader">
        <h2>1. JSON 파일 업로드</h2>
        <div class="file-grid">
          <label class="file-box">
            <span>Places Master</span>
            <input id="placesFile" type="file" accept=".json,application/json" />
            <small id="placesName">미선택</small>
          </label>
          <label class="file-box">
            <span>Maps Master</span>
            <input id="mapsFile" type="file" accept=".json,application/json" />
            <small id="mapsName">미선택</small>
          </label>
          <label class="file-box">
            <span>Place-Map Links Master</span>
            <input id="linksFile" type="file" accept=".json,application/json" />
            <small id="linksName">미선택</small>
          </label>
          <label class="file-box">
            <span>Runtime Links</span>
            <input id="runtimeFile" type="file" accept=".json,application/json" />
            <small id="runtimeName">미선택</small>
          </label>
        </div>
        <button id="runBtn" class="primary">Run QA</button>
      </section>

      <section class="dashboard">
        <div class="metric card">
          <span>Places</span>
          <strong id="placesCount">0</strong>
        </div>
        <div class="metric card">
          <span>Maps</span>
          <strong id="mapsCount">0</strong>
        </div>
        <div class="metric card">
          <span>Links</span>
          <strong id="linksCount">0</strong>
        </div>
        <div class="metric card release" id="releaseCard">
          <span>Release Ready</span>
          <strong id="releaseStatus">-</strong>
        </div>
      </section>

      <section class="card report-card">
        <h2>2. QA Report</h2>
        <div id="summary" class="summary">아직 검사를 실행하지 않았습니다.</div>
        <div id="topIssues" class="top-issues"></div>
        <div class="report-actions">
          <button id="downloadQa" disabled>QA Report 다운로드</button>
          <button id="downloadMissing" disabled>Missing Report 다운로드</button>
          <button id="downloadStats" disabled>Statistics 다운로드</button>
          <button id="downloadRelease" disabled>Release Check 다운로드</button>
        </div>
        <pre id="reportOutput"></pre>
      </section>
    </main>
  </div>

  <script src="app.js?v=0.1.3"></script>
</body>
</html>
